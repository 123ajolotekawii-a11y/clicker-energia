<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clicker Energético ULTRA</title>
<style>
body{
 font-family:Arial;
 background:linear-gradient(180deg,#020617,#0f172a);
 color:white;
 margin:0;
 overflow:hidden;
}

.left{
 position:absolute;
 left:0;
 top:20%;
 width:70%;
 height:60%;
 text-align:center;
}

.right{
 position:absolute;
 left:72.5%;
 top:20%;
 width:25%;
 height:70%;
 overflow-y:auto;
}

h1{color:#22c55e;font-size:22px}

.left h2,
.left p{
 color:#000000;
 text-shadow:none;
}

#energy,#total,#mult,#rebirthReq,#perClick,#perSecond{
 font-weight:bold;
 color:#000000;
 text-shadow:none;
}

@keyframes shake{
 0%{transform:translate(0,0) rotate(0deg)}
 20%{transform:translate(-3px,2px) rotate(-2deg)}
 40%{transform:translate(3px,-2px) rotate(2deg)}
 60%{transform:translate(-2px,2px) rotate(-1deg)}
 80%{transform:translate(2px,-1px) rotate(1deg)}
 100%{transform:translate(0,0) rotate(0deg)}
}
.shake{animation:shake 0.25s}

@keyframes particle{
 0%{opacity:1;transform:translateY(0) scale(1)}
 100%{opacity:0;transform:translateY(-60px) scale(0.5)}
}
.particle{
 position:absolute;
 color:#22c55e;
 font-weight:bold;
 animation:particle 0.6s forwards;
 pointer-events:none;
 text-shadow:0 0 6px black;
}

#planetImg{
 width:220px;
 cursor:pointer;
 user-select:none;
 filter:drop-shadow(0 0 10px #22c55e);
 transition:0.4s;
}

.progressBar{
 width:60%;height:14px;background:#0f172a;margin:10px auto;border-radius:10px;overflow:hidden;border:1px solid #22c55e
}
.progressFill{
 height:100%;width:0%;background:#22c55e;transition:0.2s
}

.upgrade{
 background:linear-gradient(145deg,#1e293b,#0f172a);
 color:white;
 display:block;
 width:100%;
 margin:8px 0;
 border-radius:10px;
 box-shadow:0 0 8px rgba(34,197,94,0.2);
 padding:10px;
}
.desc{font-size:12px;color:#94a3b8}
.panel{
 background:rgba(30,41,59,0.8);
 padding:12px;
 margin:10px;
 border-radius:12px;
 box-shadow:0 0 10px rgba(34,197,94,0.3);
}

#rebirthFX{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:black;
 opacity:0;
 pointer-events:none;
 transition:0.6s;
}

#chart{
 width:100%;height:120px;
 background:#0f172a;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="rebirthFX"></div>

<div class="left">
<h1>⚡ Clicker Energético ULTRA</h1>

<h2>Energía: <span id="energy">0</span> ⚡</h2>
<p>⚡ Por click: <span id="perClick">1</span></p>
<p>⏱️ Por segundo: <span id="perSecond">0</span></p>
<p>🌟 Multiplicador: x<span id="mult">1</span></p>

<div class="progressBar">
 <div class="progressFill" id="progressFill"></div>
</div>

<img id="planetImg" src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<canvas id="chart"></canvas>

</div>

<div class="right">

<div id="shopPanel">
<h3>🛒 Mejoras</h3>
<div id="shop"></div>
</div>

<div class="panel">
<h3>📊 Estadísticas</h3>
<p>Total generado: <span id="total">0</span></p>
</div>

<div class="panel">
<h3>🏆 Logros</h3>
<ul id="achievements"></ul>
</div>

<div class="panel">
<h3>🎮 Prestigio</h3>
<p>Necesitas: <span id="rebirthReq">5000</span> energía</p>
<button onclick="rebirth()">Reiniciar por bonus</button>
</div>

</div>

<audio id="clickSound" preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6d0c.mp3"></audio>

<script>
const energyEl=document.getElementById("energy");
const perClickEl=document.getElementById("perClick");
const perSecondEl=document.getElementById("perSecond");
const multEl=document.getElementById("mult");
const totalEl=document.getElementById("total");
const shop=document.getElementById("shop");
const achievementsEl=document.getElementById("achievements");
const planetImg=document.getElementById("planetImg");
const rebirthFX=document.getElementById("rebirthFX");
const progressFill=document.getElementById("progressFill");
const chart=document.getElementById("chart");
const ctx=chart.getContext("2d");

let energy=0,total=0,perClick=1,perSecond=0,mult=1;
let rebirthReq=5000;
let history=[];

function drawChart(){
 ctx.clearRect(0,0,chart.width,chart.height);
 ctx.beginPath();
 ctx.strokeStyle="#22c55e";

 let max=Math.max(...history,1);
 history.forEach((v,i)=>{
  let x=i*(chart.width/history.length);
  let y=chart.height-(v/max)*chart.height;
  if(i==0) ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });
 ctx.stroke();
}

planetImg.onclick=(e)=>{
 let gain=perClick*mult;
 energy+=gain;
 total+=gain;
 history.push(total);
 if(history.length>30) history.shift();

 planetImg.classList.add("shake");
 setTimeout(()=>planetImg.classList.remove("shake"),250);

 createFloatingText(e.clientX,e.clientY,gain);

 drawChart();
 updateUI();
}

let upgrades={
 led:{name:"💡 LED",baseCost:10,cost:10,count:0,type:"click",value:1,desc:"+1 por click"},
 solar:{name:"☀️ Panel",baseCost:50,cost:50,count:0,type:"sec",value:1,desc:"+1 por segundo"},
 battery:{name:"🔋 Batería",baseCost:150,cost:150,count:0,type:"sec",value:5,desc:"+5 por segundo"},
 factory:{name:"🏭 Fábrica",baseCost:500,cost:500,count:0,type:"click",value:5,desc:"+5 por click"},
 city:{name:"🌆 Ciudad",baseCost:2000,cost:2000,count:0,type:"sec",value:20,desc:"+20 por segundo"}
};

let achievements=[
 {text:"100 energía",goal:100,done:false},
 {text:"1000 energía",goal:1000,done:false},
 {text:"10000 energía",goal:10000,done:false}
];

function updateUI(){
 energyEl.innerText=Math.floor(energy);
 perClickEl.innerText=perClick;
 perSecondEl.innerText=perSecond;
 multEl.innerText=mult;
 totalEl.innerText=Math.floor(total);
 progressFill.style.width=Math.min(100,(energy/rebirthReq)*100)+"%";

 shop.innerHTML="";
 for(let k in upgrades){
  let u=upgrades[k];
  let b=document.createElement("button");
  b.className="upgrade";
  b.innerHTML=`${u.name} (${Math.floor(u.cost)}) x${u.count}<div class='desc'>${u.desc}</div>`;
  b.onclick=()=>{
    b.classList.add("shake");
    setTimeout(()=>b.classList.remove("shake"),250);
    buy(k);
  };
  shop.appendChild(b);
 }

 achievementsEl.innerHTML="";
 achievements.forEach(a=>{
  if(!a.done && total>=a.goal)a.done=true;
  let li=document.createElement("li");
  li.innerText=a.done?"✅ "+a.text:a.text;
  achievementsEl.appendChild(li);
 });

 if(total>1000000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Blue_Marble_2002.png";
 else if(total>500000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Earth_Eastern_Hemisphere.jpg";
 else if(total>200000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/8/83/Earth_Western_Hemisphere.jpg";
 else if(total>100000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/1/1f/Earth_Day.jpg";
 else if(total>50000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg";
 else if(total>10000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/6/60/Earth_from_Space.jpg";
 else if(total>1000) planetImg.src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg";
}

function buy(t){
 let u=upgrades[t];
 if(energy>=u.cost){
  energy-=u.cost;
  u.count++;
  if(u.type=="click")perClick+=u.value;
  else perSecond+=u.value;
  u.cost=Math.floor(u.baseCost*Math.pow(1.15,u.count));
 }
 updateUI();
}

function rebirth(){
 if(total>=rebirthReq){

  rebirthFX.style.opacity=1;
  setTimeout(()=>rebirthFX.style.opacity=0,600);

  mult+=1;
  energy=0;
  perClick=1;
  perSecond=0;

  for(let k in upgrades){
    upgrades[k].count=0;
    upgrades[k].cost=upgrades[k].baseCost;
  }

  rebirthReq=Math.floor(rebirthReq*1.6);
 }
}

setInterval(()=>{
 energy+=perSecond*mult;
 total+=perSecond*mult;
 updateUI();
},1000);

function createFloatingText(x,y,value){
 const el=document.createElement("div");
 el.className="particle";
 el.innerText="+"+Math.floor(value);
 el.style.left=x+"px";
 el.style.top=y+"px";
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),600);
}

updateUI();
</script>

</body>
</html>
